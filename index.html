<!doctype html>
<html lang="ru">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ПРОЖАРИМ — Grill & BBQ</title>

<link rel="icon" href="assets/logo.png">

<link rel="stylesheet" href="css/style.css">

<script defer src="https://api-maps.yandex.ru/2.1/?apikey=62bb0bf1-3235-41f0-b3de-b09cfed11b52&lang=ru_RU"></script>

<script defer src="js/app.js"></script>

</head>


<body>


<header class="header">

<div class="wrap header__row">

<a class="brand">

<img src="assets/logo.png" class="brand__logo">

<div>

<div class="brand__name">ПРОЖАРИМ</div>

<div class="brand__sub">GRILL & BBQ</div>

</div>

</a>


<nav class="nav">

<a href="#menu" class="nav__link">Меню</a>

<a href="#delivery" class="nav__link">Доставка</a>

<a href="#contacts" class="nav__link">Контакты</a>

</nav>


<button class="cartBtn" id="openCart">

<span>Корзина</span>

<span class="cartBtn__count" id="cartCount">0</span>

</button>

</div>

</header>



<main>

<section class="section" id="menu">

<div class="wrap">

<div class="section__head">

<h2 class="section__title">Меню</h2>

<div class="section__tools">

<div class="tabs" id="categoryTabs"></div>

<div class="search">

<input id="search" placeholder="Поиск по меню">

</div>

</div>

</div>

<div class="grid" id="products"></div>

</div>

</section>



<section class="section" id="delivery">

<div class="wrap">

<h2 class="section__title">Доставка</h2>

<p>Работаем круглосуточно</p>

</div>

</section>



<section class="section" id="contacts">

<div class="wrap">

<h2 class="section__title">Контакты</h2>

<p>Телефон: +7 (3532) 570-767</p>

</div>

</section>

</main>



<!-- CART -->

<div class="drawer" id="cartDrawer">

<div class="drawer__backdrop" id="closeCart"></div>

<div class="drawer__panel">

<div class="drawer__head">

<div class="drawer__title">Корзина</div>

<button class="iconBtn" id="closeCart2">✕</button>

</div>

<div class="drawer__body">

<div id="cartItems"></div>

</div>

<div class="drawer__foot">

<div class="sumRow">

<div>Сумма</div>

<div id="cartSubtotal">0 ₽</div>

</div>

<button class="btn btn--primary w100" id="goCheckout">Оформить заказ</button>

</div>

</div>

</div>



<!-- CHECKOUT -->

<div class="modal" id="checkoutModal">

<div class="modal__backdrop" id="closeCheckout"></div>

<div class="modal__panel">

<div class="modal__head">

<div class="modal__title">Оформление заказа</div>

<button class="iconBtn" id="closeCheckout2">✕</button>

</div>


<form class="modal__body" id="checkoutForm">


<div class="formGrid">

<div class="field">

<label>Имя</label>

<input name="name" required>

</div>

<div class="field">

<label>Телефон</label>

<input id="phoneInput" name="phone" required placeholder="+79999999999">

</div>

</div>



<div class="field">

<label>Способ получения</label>

<div class="seg">

<button type="button" class="seg__btn isOn" data-mode="delivery">Доставка</button>

<button type="button" class="seg__btn" data-mode="pickup">Самовывоз</button>

</div>

<input type="hidden" name="mode" value="delivery">

</div>



<div id="pickupBlock" hidden>

<label>Адрес самовывоза</label>

<select name="pickupAddress">

<option>Оренбург, Театральная 1/1</option>

<option>Оренбург, 27 линия 60</option>

<option>Оренбург, Кичигина 8</option>

</select>

</div>



<div id="deliveryBlock">

<div class="field">

<label>Адрес доставки</label>

<input id="addressInput" name="address" placeholder="Введите адрес">

<div id="addressSuggest"></div>

</div>


<div class="formGrid formGrid--3">

<div class="field">

<label>Подъезд</label>

<input name="entrance">

</div>

<div class="field">

<label>Этаж</label>

<input name="floor">

</div>

<div class="field">

<label>Квартира</label>

<input name="flat">

</div>

</div>


<div class="mapWrap">

<div class="map" id="map"></div>

</div>

</div>



<div class="formGrid">

<div class="field">

<label>Оплата</label>

<select name="payment">

<option value="cash">Наличными</option>

<option value="card">Картой курьеру</option>

<option value="transfer">Переводом курьеру</option>

</select>

</div>



<div class="field">

<label>Когда?</label>

<div class="seg">

<button type="button" class="seg__btn isOn" data-time="now">Ближайшее время</button>

<button type="button" class="seg__btn" data-time="later">Указать дату и время</button>

</div>

<input type="hidden" name="whenType" value="now">

<div id="timeBlock" style="display:none;margin-top:10px">

<input type="datetime-local" name="whenDate">

</div>

</div>

</div>



<div class="field">

<label>Комментарий</label>

<input name="comment">

</div>



<div class="totalBox">

<div class="totalRow">

<span>Сумма</span>

<b id="sumProducts">0 ₽</b>

</div>

<div class="totalRow">

<span>Доставка</span>

<b id="sumDelivery">—</b>

</div>

<div class="totalRow totalRow--grand">

<span>Итого</span>

<b id="sumTotal">0 ₽</b>

</div>

</div>



<button class="btn btn--primary w100" id="submitOrder">

Отправить заказ

</button>


<div class="toast" id="toast"></div>


</form>

</div>

</div>


</body>
</html>
