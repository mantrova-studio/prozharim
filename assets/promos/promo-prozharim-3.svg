<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgLuxury" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06070B"/>
      <stop offset="0.45" stop-color="#0D1020"/>
      <stop offset="1" stop-color="#07080C"/>
    </linearGradient>

    <linearGradient id="accentLuxury" x1="120" y1="70" x2="1450" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.52" stop-color="#5B5CF0"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>

    <linearGradient id="pillLuxury" x1="0" y1="0" x2="320" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4B5FD"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>

    <linearGradient id="btnLuxury" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14182A"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>

    <linearGradient id="vinylCenter" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>

    <filter id="blurGlowLuxury" x="-120" y="-120" width="1840" height="820">
      <feGaussianBlur stdDeviation="56"/>
    </filter>

    <filter id="softShadowLuxury" x="-20" y="-20" width="240" height="240">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <filter id="textGlowLuxury" x="-40" y="-40" width="1200" height="240">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#8B5CF6" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="40" fill="url(#bgLuxury)"/>

  <g filter="url(#blurGlowLuxury)" opacity="0.9">
    <circle cx="1240" cy="110" r="190" fill="#7C3AED" fill-opacity="0.22"/>
    <circle cx="260" cy="455" r="220" fill="#06B6D4" fill-opacity="0.12"/>
    <circle cx="870" cy="300" r="250" fill="#5B5CF0" fill-opacity="0.14"/>
  </g>

  <path d="M0 112C180 68 340 64 500 102C675 144 845 146 1015 104C1195 60 1390 72 1600 142V520H0V112Z"
        fill="url(#accentLuxury)" fill-opacity="0.15"/>

  <path d="M0 312C200 270 360 266 530 302C710 340 905 350 1118 305C1290 268 1450 266 1600 296V520H0V312Z"
        fill="#7C3AED" fill-opacity="0.08"/>

  <circle cx="1470" cy="90" r="190" fill="#FFFFFF0A"/>
  <circle cx="1470" cy="90" r="112" fill="#FFFFFF07"/>

  <!-- subtle equalizer -->
  <g transform="translate(760 188)" opacity="0.82">
    <rect x="0" y="84" width="12" height="72" rx="6" fill="url(#accentLuxury)"/>
    <rect x="22" y="34" width="12" height="122" rx="6" fill="url(#accentLuxury)"/>
    <rect x="44" y="92" width="12" height="64" rx="6" fill="url(#accentLuxury)"/>
    <rect x="66" y="14" width="12" height="142" rx="6" fill="url(#accentLuxury)"/>
    <rect x="88" y="56" width="12" height="100" rx="6" fill="url(#accentLuxury)"/>
    <rect x="110" y="24" width="12" height="132" rx="6" fill="url(#accentLuxury)"/>
    <rect x="132" y="88" width="12" height="68" rx="6" fill="url(#accentLuxury)"/>
    <rect x="154" y="46" width="12" height="110" rx="6" fill="url(#accentLuxury)"/>
  </g>

  <!-- premium vinyl -->
  <g transform="translate(905 84)">
    <circle cx="180" cy="176" r="128" fill="#111318" stroke="#2A2E38" stroke-width="4"/>
    <circle cx="180" cy="176" r="110" stroke="#242833" stroke-width="2"/>
    <circle cx="180" cy="176" r="94" stroke="#2C313D" stroke-width="2"/>
    <circle cx="180" cy="176" r="78" stroke="#272C37" stroke-width="2"/>
    <circle cx="180" cy="176" r="60" fill="url(#vinylCenter)"/>
    <circle cx="180" cy="176" r="11" fill="#F8FAFC"/>

    <path d="M296 86L388 132" stroke="#D4D4D8" stroke-width="8" stroke-linecap="round"/>
    <circle cx="394" cy="135" r="10" fill="#F1F5F9"/>
    <rect x="286" y="74" width="24" height="24" rx="8" fill="#E5E7EB"/>
  </g>

  <text x="90" y="100" fill="#C4B5FD" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="8">
    ПРОЖАРИМ
  </text>

  <rect x="90" y="130" width="320" height="64" rx="32" fill="#0C1120" stroke="#8B5CF6" stroke-opacity="0.35" stroke-width="2"/>
  <text x="250" y="172" text-anchor="middle" fill="url(#pillLuxury)" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="2">
    SPECIAL RELEASE
  </text>

  <g filter="url(#textGlowLuxury)">
    <text x="90" y="272" fill="white" font-size="84" font-family="Arial, Helvetica, sans-serif" font-weight="900">
      СЛУШАЙ НАШУ ПЕСНЮ
    </text>
  </g>

  <text x="90" y="348" fill="#EEF2FF" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    Фирменный трек Прожарим уже доступен
  </text>

  <text x="90" y="402" fill="#CBD5E1" font-size="33" font-family="Arial, Helvetica, sans-serif">
    включайте на любимой площадке и делитесь с друзьями
  </text>

  <text x="90" y="454" fill="#FFFFFF80" font-size="24" font-family="Arial, Helvetica, sans-serif">
    выберите сервис справа и слушайте прямо сейчас
  </text>

  <!-- right buttons -->
  <a href="#" target="_blank">
