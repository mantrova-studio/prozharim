  <a href="#" target="_blank">
    <g filter="url(#softShadowLuxury)" style="cursor:pointer">
      <rect x="1332" y="312" width="122" height="122" rx="28" fill="url(#btnLuxury)" stroke="#22D3EE" stroke-opacity="0.42" stroke-width="2"/>
      <circle cx="1393" cy="373" r="29" fill="#FF0033"/>
      <polygon points="1384,357 1384,389 1410,373" fill="white"/>
      <text x="1393" y="418" text-anchor="middle" fill="white" font-size="12" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.1">
        YT MUSIC
      </text>
    </g>
