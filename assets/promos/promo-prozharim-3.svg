      <rect x="1180" y="160" width="122" height="122" rx="28" fill="url(#btnLuxury)" stroke="#8B5CF6" stroke-opacity="0.42" stroke-width="2"/>
      <circle cx="1241" cy="221" r="29" fill="#FC3F1D"/>
      <text x="1241" y="231" text-anchor="middle" fill="white" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="900">
        Я
      </text>
      <text x="1241" y="266" text-anchor="middle" fill="white" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.5">
        MUSIC
      </text>
    </g>
  </a>

  <a href="#" target="_blank">
    <g filter="url(#softShadowLuxury)" style="cursor:pointer">
      <rect x="1332" y="160" width="122" height="122" rx="28" fill="url(#btnLuxury)" stroke="#22D3EE" stroke-opacity="0.42" stroke-width="2"/>
      <rect x="1364" y="192" width="58" height="58" rx="18" fill="#2787F5"/>
      <text x="1393" y="229" text-anchor="middle" fill="white" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="900">
        VK
      </text>
      <text x="1393" y="266" text-anchor="middle" fill="white" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.5">
        MUSIC
      </text>
    </g>
  </a>

  <a href="#" target="_blank">
    <g filter="url(#softShadowLuxury)" style="cursor:pointer">
      <rect x="1180" y="312" width="122" height="122" rx="28" fill="url(#btnLuxury)" stroke="#6366F1" stroke-opacity="0.42" stroke-width="2"/>
      <circle cx="1241" cy="373" r="29" fill="#FA57C1"/>
      <text x="1241" y="384" text-anchor="middle" fill="white" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="900">
        ♫
      </text>
      <text x="1241" y="418" text-anchor="middle" fill="white" font-size="12" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.1">
